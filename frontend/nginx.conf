server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Проксируем API-запросы на бэкенд
    location /api/ {
        proxy_pass https://gradeestimates-production.up.railway.app/api/;
        proxy_set_header Host gradeestimates-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Все остальные запросы отдаём index.html (для Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
